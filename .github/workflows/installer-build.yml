name: Build Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'installer-*'

jobs:
  build-installer:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            name: windows
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macos-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macos-x64
          - platform: ubuntu-22.04
            args: ''
            name: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Install frontend dependencies
        working-directory: installer
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build installer
        working-directory: installer
        run: cargo tauri build ${{ matrix.args }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: santibot-installer-${{ matrix.name }}
          path: |
            installer/src-tauri/target/release/bundle/msi/*.msi
            installer/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v5
        with:
          name: santibot-installer-${{ matrix.name }}
          path: installer/src-tauri/target/*/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v5
        with:
          name: santibot-installer-${{ matrix.name }}
          path: |
            installer/src-tauri/target/release/bundle/deb/*.deb
            installer/src-tauri/target/release/bundle/appimage/*.AppImage
