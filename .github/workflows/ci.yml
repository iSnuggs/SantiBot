name: CI/CD

on:
  push:
    branches: [ main, develop ]
    tags:
      - '*'
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Test
      run: dotnet test -c Release --no-build --verbosity normal --filter "FullyQualifiedName!~CommandStringsTests"
      timeout-minutes: 10

  build:
    name: Build Package
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtime: [linux-x64, linux-arm64, win-x64, win-arm64, osx-x64, osx-arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Set version
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

    - name: Publish
      run: |
        dotnet publish -c Release -r ${{ matrix.runtime }} \
          --self-contained \
          -p:Version=${{ env.VERSION }} \
          -o santi-${{ matrix.runtime }} src/SantiBot/SantiBot.csproj

    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: santi-${{ matrix.runtime }}
        path: santi-${{ matrix.runtime }}

  create-release:
    name: Create Release
    needs:
      - build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: 'santi-*'
          path: artifacts

      - name: Create archives
        run: |
          cd artifacts
          for dir in */; do
            runtime="${dir%/}"
            if [[ "$runtime" == *"win"* ]]; then
              zip -r "$runtime.zip" "$runtime"
            else
              chmod +x "$runtime/SantiBot" 2>/dev/null || true
              tar -czf "$runtime.tar.gz" "$runtime"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: SantiBot ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz

  docker:
    name: Build and Push Docker image
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/isnuggs/santibot:latest
            ghcr.io/isnuggs/santibot:${{ github.ref_name }}

  publish-medusa-package:
    name: Publish Medusa Package
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Set version
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        echo "MEDUSA_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Pack and Push
      working-directory: src/Santi.Medusa
      run: |
        dotnet pack -c Release /p:Version=${{ env.MEDUSA_VERSION }} -o bin/Release/packed
        dotnet nuget push bin/Release/packed/*.nupkg --source https://www.myget.org/F/santi/api/v2/package --api-key ${{ secrets.MYGET_API_KEY }}
      continue-on-error: true
