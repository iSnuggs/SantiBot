# SantiBot Docker Compose
# Run: docker compose up -d
# Logs: docker compose logs -f santibot

version: "3.8"

services:
  santibot:
    build: .
    container_name: santibot
    restart: unless-stopped
    volumes:
      - santibot-data:/app/data
    environment:
      - TZ=UTC

  # Uncomment to run the web dashboard alongside the bot
