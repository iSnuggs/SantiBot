autoresponseadd:
  desc: >-
    Creates a new auto-response. When someone sends a message matching the trigger,
    the bot responds automatically. Supports variables like {user}, {server}, {channel}.
  ex:
    - 'Contains hello Hey there {user}!'
    - 'ExactMatch !rules Please read the rules in #rules'
    - 'StartsWith !ticket A mod will be with you shortly'
  params:
    - triggerType:
        desc: "How to match: Contains, ExactMatch, StartsWith, Wildcard, or Regex"
      trigger:
        desc: "The text/pattern that triggers the response"
      response:
        desc: "The message to send when triggered"
autoresponseremove:
  desc: Removes an auto-response by its ID number.
  ex:
    - '1'
  params:
    - responseId:
        desc: "The ID of the auto-response to remove"
autoresponsetoggle:
  desc: Enables or disables an auto-response without deleting it.
  ex:
    - '1'
  params:
    - responseId:
        desc: "The ID of the auto-response to toggle"
autoresponselist:
  desc: Shows all auto-responses for this server.
  ex:
    - ''
  params:
    - {}
autoresponsecooldown:
  desc: Sets cooldowns for an auto-response to prevent spam. User cooldown limits per-person, channel cooldown limits per-channel.
  ex:
    - '1 30'
    - '1 30 60'
  params:
    - responseId:
        desc: "The ID of the auto-response"
      userCooldownSeconds:
        desc: "Seconds between triggers for the same user (0 = no limit)"
      channelCooldownSeconds:
        desc: "Seconds between triggers in the same channel (0 = no limit)"
autoresponsedeletetrigger:
  desc: Toggles whether the triggering message should be automatically deleted when an auto-response fires.
  ex:
    - '1'
  params:
    - responseId:
        desc: "The ID of the auto-response"
