iam:
  desc: >-
    Adds a role to you that you choose. Role must be on the list of
    self-assignable roles.
  ex:
    - Gamer
  params:
    - role:
        desc: The role to assign.
iamnot:
  desc: >-
    Removes a specified role from you. Role must be on the list of
    self-assignable roles.
  ex:
    - Gamer
  params:
    - role:
        desc: The role to remove.
saradd:
  desc: >-
    Adds a role to the list of self-assignable roles. You can also specify a
    group. If 'Exclusive self-assignable roles' feature is enabled (`{0}tesar`),
    users will be able to pick one role per group.
  ex:
    - Gamer
    - 1 Alliance
    - 1 Horde
  params:
    - role:
        desc: The role that can be assigned by the user.
    - group:
        desc: The ID of a group that the designated role should belong to.
      role:
        desc: The role that can be assigned by the user.
sarautodelete:
  desc: >-
    Toggles the automatic deletion of the user's message and Santi's
    confirmations for `{0}iam` and `{0}iamn` commands.
  ex:
    - ''
  params:
    - {}
sarexclusive:
  desc: |-
    Toggles the sar group as exclusive.
    While enabled, users can only have one self-assignable role from that group.
  ex:
    - '1'
  params:
    - group:
        desc: The number of the group to set exclusive.
sargroupdelete:
  desc: Deletes a self-assignable role group
  ex:
    - 0
  params:
    - group:
        desc: The number of the group to delete.
sargroupname:
  desc: Sets a self assignable role group name. Provide no name to remove.
  ex:
    - 1 Faction
    - 2
  params:
    - group:
        desc: The group number
      name:
        desc: The optional name to assign, clears the name if no name is provided.
sargrouprolereq:
  desc: >-
    Set a role that users have to have in order to assign a self-assignable role
    from the specified group.
  ex:
    - 1 SomeRole
  params:
    - group:
        desc: The group number.
      role:
        desc: The role that is required.
sarlist:
  desc: Lists self-assignable roles. Shows 20 roles per page.
  ex:
    - ''
    - 2
  params:
    - page:
        desc: The page number to show.
sarremove:
  desc: Removes a specified role from the list of self-assignable roles.
  ex:
    - Gamer
    - Alliance
    - Horde
  params:
    - role:
        desc: The role to remove from the list of self-assignable roles.
sarrolelevelreq:
  desc: Set a level requirement on a self-assignable role.
  ex:
    - 5 SomeRole
  params:
    - level:
        desc: The minimum level required for the role.
      role:
        desc: The self-assignable role to set the level requirement on.
