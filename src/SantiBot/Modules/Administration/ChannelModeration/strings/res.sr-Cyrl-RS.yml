imageonly_disable: Овај канал више није само за слике.
imageonly_enable: Овај канал је сада само за слике.
linkonly_disable: Овај канал више није само за линкове.
linkonly_enable: Овај канал је сада само за линкове.
nsfw_set_false: NSFW је искључен на овом каналу.
nsfw_set_true: NSFW је укључен на овом каналу.

channel_delmsgoncmd: Подешавања за канал
delmsg_channel_inherit: Аутоматски ћу брисати поруке које успешно изврше команде на овом каналу само ако је ова функција укључена на серверу.
delmsg_channel_off: Никада нећу аутоматски брисати поруке које успешно изврше команде на овом каналу.
delmsg_channel_on: Увек ћу аутоматски брисати поруке које успешно изврше команде на овом каналу, без обзира на подешавање сервера.
delmsg_off: Више нећу аутоматски брисати поруке које успешно изврше команде на овом серверу.
delmsg_on: Аутоматски ћу брисати поруке које успешно изврше команде на овом серверу.
server_delmsgoncmd: Подешавање сервера
