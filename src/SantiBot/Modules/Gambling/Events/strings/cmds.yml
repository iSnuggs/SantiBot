eventstart:
  desc: |-
    Starts one of the events seen on public Santi.
    Events: `reaction`, `gamestatus`
  ex:
    - reaction
    - reaction -d 1 -a 50 --pot-size 1500
  params:
    - ev:
        desc: The type of event being started.
      options:
        desc: The optional option flags for the event.
