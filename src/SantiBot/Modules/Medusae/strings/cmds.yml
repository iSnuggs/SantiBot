medusainfo:
  desc: >-
    Shows information about the specified medusa such as the author, name,
    description, list of sneks, number of commands etc.

    Provide no name to see the basic information about all loaded medusae. 
  ex:
    - mycoolmedusa
    - ''
  params:
    - name:
        desc: The author of the specified medusa.
medusalist:
  desc: Lists all loaded and unloaded medusae.
  ex:
    - ''
  params:
    - {}
medusaload:
  desc: |-
    Loads a medusa with the specified name from the data/medusae/ folder.
    Provide no name to see the list of loadable medusae.
  ex:
    - mycoolmedusa
    - ''
  params:
    - name:
        desc: The name of a pre-existing medusa to load.
medusareload:
  desc: |-
    Unloads and then reloads the specified medusa.
  ex:
    - mycoolmedusa
  params:
    - name:
        desc: "The name of the medusa to reload."
medusaunload:
  desc: |-
    Unloads the previously loaded medusa.
    Provide no name to see the list of unloadable medusae. 
  ex:
    - mycoolmedusa
    - ''
  params:
    - name:
        desc: The name of a specific medusa to be unloaded.
