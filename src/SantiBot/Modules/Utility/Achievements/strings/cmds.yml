achievements:
  desc: >-
    Show your unlocked achievements, or view another user's achievements by
    mentioning them.
  ex:
    - ''
    - '@user'
  params:
    - {}
    - user:
        desc: The user whose achievements you want to view.
achievementslist:
  desc: List all possible achievements and whether you have unlocked them.
  ex:
    - ''
  params:
    - {}
achievementsstats:
  desc: >-
    Show your achievement progress broken down by category, with a progress
    bar for each category and your most recently unlocked achievement.
  ex:
    - ''
  params:
    - {}
achievementslb:
  desc: Show the top 10 users in this server ranked by achievements unlocked.
  ex:
    - ''
  params:
    - {}
