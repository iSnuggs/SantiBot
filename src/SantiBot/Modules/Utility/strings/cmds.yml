afk:
  desc: |-
    Toggles AFK status for yourself with the specified message. 
    If you don't provide a message it default to a generic one.
    Anyone @ mentioning you in any server will receive the afk message.
    This will only work if the other user's message starts with the mention.
  ex:
    - ''
  params:
    - msg:
        desc: The message to send when someone pings you.
channelid:
  desc: Shows current channel ID.
  ex:
    - ''
  params:
    - {}
channeltopic:
  desc: Sends current channel's topic as a message.
  ex:
    - ''
  params:
    - channel:
        desc: The channel where the topic is retrieved from.
checkperms:
  desc: Checks yours or bot's user-specific permissions on this channel.
  ex:
    - me
    - bot
  params:
    - who:
        desc: The identity of the entity whose permissions are being checked.
config:
  desc: >-
    Gets or sets configuration values.

    Provide no arguments to see the list of configs you can edit/view.

    Provide config name to see all properties in that configuration and their
    values.

    Provide config name and property name to see that property's description and
    value.

    Provide config name, property name and value to set that property to the new
    value.
  ex:
    - ''
    - bot
    - bot color.ok
    - bot color.ok ff0000
  params:
    - name:
        desc: >-
          The name of a specific configuration section or category. It is used
          as an identifier to access its properties and values.
      prop:
        desc: >-
          The name of a specific configuration property or section. It is used
          to retrieve or modify its settings.
      value:
        desc: The new value for a specific configuration property.
configreload:
  desc: Reloads specified configuration
  ex:
    - bot
    - gambling
  params:
    - name:
        desc: The path or identifier of the configuration file or section to reload.
emojiadd:
  desc: >-
    Adds the specified emoji to this server.

    You can specify a name before the emoji to add it under a different name.

    You can specify a name followed by an image link to add a new emoji from an
    image.

    You can omit imageUrl and instead upload the image as an attachment. 

    Image size has to be below 256KB.
  ex:
    - ':someonesCustomEmoji:'
    - 'MyEmojiName :someonesCustomEmoji:'
    - owoNice https://cdn.discordapp.com/emojis/587930873811173386.png?size=128
  params:
    - emote:
        desc: The type of emoji being added, such as a smiley face or a thumbs up.
      name:
        desc: The name of the emoji or the file to be uploaded.
    - emote:
        desc: The type of emoji being added, such as a smiley face or a thumbs up.
    - name:
        desc: The name of the emoji or the file to be uploaded.
      url:
        desc: The URL of an image file to use as the emoji's representation.
emojiremove:
  desc: Removes the specified emoji or emojis from this server.
  ex:
    - ':eagleWarrior: :plumedArcher:'
  params:
    - emotes:
        desc: The list of emojis to be removed from the server.
eval:
  desc: >-
    Execute arbitrary C# code and (optionally) return a result. Several
    namespaces are included by default.

    Special variables available: 

    `self` - Instance of the command group executing the command (this)

    `guild` - Server in which the command is executed

    `channel` - Channel in which the command is executed

    `user` - User executing the command

    `ctx` - Discord.Net command context

    `services` - Santi's IServiceProvider
  ex:
    - 123 / 4.5f
    - await ctx.OkAsync();
    - await ctx.Response().Confirm("uwu").SendAsync();
  params:
    - scriptText:
        desc: The code to be executed by the function.
inrole:
  desc: |-
    Lists every person from the specified role(s) on this server. When multiple roles are specified, shows users who have ALL of them. You can specify a page number as the first argument. Provide no role to list users who have no roles.
  ex:
    - RoleName
    - 5 RoleName
    - ''
    - '@Moderator @VIP'
    - '5 @Moderator @VIP'
  params:
    - page:
        desc: "The starting page number for the result set."
      roles:
        desc: "One or more roles to filter by. Users must have ALL specified roles."
    - roles:
        desc: "One or more roles to filter by. Users must have ALL specified roles."
ping:
  desc: Ping the bot to see if there are latency issues.
  ex:
    - ''
  params:
    - {}
roleid:
  desc: Shows the id of the specified role.
  ex:
    - Some Role
  params:
    - role:
        desc: The role that is being referenced.
roles:
  desc: >-
    List roles on this server or roles of a user if specified. Paginated, 20
    roles per page.
  ex:
    - 2
    - '@Someone'
  params:
    - page:
        desc: The page number for the list of roles to be displayed.
      target:
        desc: The user whose roles to list. If omitted, lists all server roles.
    - page:
        desc: The page number for the list of roles to be displayed.
savechat:
  desc: |-
    Saves a number of messages to a text file and sends it to you.
    Max is 1000, unless you're the bot owner. 
  ex:
    - 150
  params:
    - cnt:
        desc: The number of messages to be saved.
say:
  desc: >-
    Make the bot say something, or in other words, make the bot send the
    message.

    You can optionally specify the channel where the bot will send the message.

    If you omit the channel name, it will send the message in the current
    channel.

    Supports [embeds](https://eb.santi.bot/)
  ex:
    - hi
    - '#chat hi'
  params:
    - channel:
        desc: The destination where the bot will send the message.
      message:
        desc: >-
          The message to be sent by the bot. It can contain rich text
          formatting.
    - message:
        desc: >-
          The message to be sent by the bot. It can contain rich text
          formatting.
servercolorerror:
  desc: Sets the Error color for this server.
  ex:
    - '#ff0000'
  params:
    - color:
        desc: The hex of the color to set
servercolorok:
  desc: Sets the Ok color for this server.
  ex:
    - '#00ff00'
  params:
    - color:
        desc: The hex of the color to set
servercolorpending:
  desc: Sets the Pending/Warning color for this server.
  ex:
    - '#ffff00'
  params:
    - color:
        desc: The hex of the color to set
servercolorsshow:
  desc: Shows current Ok, Error and Pending colors for this server.
  ex:
    - ''
  params:
    - {}
serverid:
  desc: Shows current server ID.
  ex:
    - ''
  params:
    - {}
serverlist:
  desc: Lists servers the bot is on with some basic info. 9 per page.
  ex:
    - 3
  params:
    - page:
        desc: The page number to display.
showembed:
  desc: Prints the json equivalent of the embed of the message specified by its Id.
  ex:
    - 820022733172121600
    - '#some-channel 820022733172121600'
  params:
    - messageId:
        desc: The ID of a message that contains an embed to be displayed as JSON.
    - ch:
        desc: >-
          The channel where the message is located that will be used for the
          embed to be printed as JSON.
      messageId:
        desc: The ID of a message that contains an embed to be displayed as JSON.
showemojis:
  desc: Shows a name and a link to every SPECIAL emoji in the message.
  ex:
    - A message full of SPECIAL emojis
  params:
    - _:
        desc: The text containing the emojis to be processed.
snipe:
  desc: >-
    Snipe the message you replied to with this command.

    Otherwise, if you don't reply to a message, it will snipe the last message
    sent in the channel (out of the last few messages) which has text or an
    image.
  ex:
    - ''
  params:
    - {}
stats:
  desc: Shows some basic stats for Santi.
  ex:
    - ''
  params:
    - {}
stickeradd:
  desc: >-
    Adds the sticker from your message to this server.

    Send the sticker along with this command (in the same message).

    Alternatively you can upload an image along with this command but you have
    to specify the name.

    The image must be 300x300 in .png or .apng format and up to 512KB in size.
  ex:
    - ''
    - name "description" tag1 tag2 tagN
  params:
    - description:
        desc: The text that describes the sticker being added.
      name:
        desc: The identifier for the sticker to be added.
      tags:
        desc: The list of tags associated with the sticker being added.
userid:
  desc: Shows user ID.
  ex:
    - ''
    - '@Someone'
  params:
    - target:
        desc: The user whose ID to show. Defaults to yourself.
verboseerror:
  desc: >-
    Toggles or sets whether the bot should print command errors when a command
    is incorrectly used.
  ex:
    - ''
    - false
  params:
    - newstate:
        desc: >-
          The state that determines whether error messages are displayed to the
          user.
whosplaying:
  desc: Shows a list of users who are playing the specified game.
  ex:
    - Overwatch
  params:
    - game:
        desc: The name of the game being played by the users.

