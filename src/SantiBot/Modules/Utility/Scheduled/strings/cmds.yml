scheduleadd:
  desc: |-
    Schedules a command to be executed after the specified amount of time.
    You can schedule up to 5 commands at a time.
  ex:
    - 1h5m .say Hello after 1 hour and 5 minutes
    - 3h .br all
  params:
    - time:
        desc: >-
          How long it takes for the command to execute. Example: 1h30m = 1 hour
          and 30 minutes
    - command:
        desc: Command that will be executed after the specified time has elapsed
scheduledelete:
  desc: Deletes one of your scheduled commands by its ID.
  ex:
    - '5'
  params:
    - id:
        desc: The ID of the scheduled command to delete.
schedulelist:
  desc: Lists your scheduled commands in the current server.
  ex:
    - ''
  params:
    - {}
