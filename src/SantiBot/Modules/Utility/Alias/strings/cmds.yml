alias:
  desc: >-
    Create a custom alias for a certain Santi command. Provide no alias to
    remove the existing one.
  ex:
    - allin {0}bf all h
  params:
    - trigger:
        desc: The alias name that will be used to invoke the command.
      mapping:
        desc: The original command that the alias maps to.
aliasesclear:
  desc: Deletes all aliases on this server.
  ex:
    - ''
  params:
    - {}
aliaslist:
  desc: Shows the list of currently set aliases. Paginated.
  ex:
    - ''
    - 3
  params:
    - page:
        desc: The page number to display.
