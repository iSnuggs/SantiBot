autocommandadd:
  desc: >-
    Adds a command to the list of commands which will be executed automatically
    every X seconds.
  ex:
    - 60 {0}prune 1000
  params:
    - cmdText:
        desc: The text of the command to be executed when triggered.
      interval:
        desc: The time period between consecutive executions of the added command.
autocommandremove:
  desc: Removes an auto command on the specified index.
  ex:
    - 3
  params:
    - index:
        desc: >-
          The index at which the auto command is located in the list of
          commands.
autocommandslist:
  desc: Lists all auto commands and the intervals in which they execute.
  ex:
    - ''
  params:
    - page:
        desc: The page number to display.
cacheusers:
  desc: Caches users of a Discord server and saves them to the database.
  ex:
    - ''
    - serverId
  params:
    - {}
    - guild:
        desc: The guild for which user data is being cached.
coordreload:
  desc: Reloads coordinator config
  ex:
    - ''
  params:
    - {}
deleteemptyservers:
  desc: Deletes all servers in which the bot is the only member.
  ex:
    - ''
  params:
    - {}
die:
  desc: Shuts the bot down.
  ex:
    - ''
  params:
    - graceful:
        desc: >-
          The option to perform a controlled shutdown, allowing for any
          necessary cleanup or notifications before termination.
doas:
  desc: >-
    Execute the command as if you were the target user. Requires bot ownership
    and server administrator permission.
  ex:
    - '@Thief .give all @Admin'
  params:
    - message:
        desc: The command or script to execute as the target user.
      user:
        desc: >-
          The user whose identity is being impersonated for the command
          execution.
forwardmessages:
  desc: >-
    Toggles forwarding of non-command messages sent to bot's DM to the bot
    owners
  ex:
    - ''
  params:
    - {}
forwardtoall:
  desc: >-
    Toggles whether messages will be forwarded to all bot owners or only to the
    first one specified in the creds.yml file
  ex:
    - ''
  params:
    - {}
forwardtochannel:
  desc: >-
    Toggles forwarding of non-command messages sent to bot's DM to the current
    channel
  ex:
    - ''
  params:
    - {}
leave:
  desc: Makes Santi leave the server. Either server name or server ID is required.
  ex:
    - 123123123331
  params:
    - guildStr:
        desc: The name of the server where Santi should leave.
restart:
  desc: Restarts the bot. Might not work.
  ex:
    - ''
  params:
    - {}
restartshard:
  desc: >-
    Try (re)connecting a shard with a certain shardid when it dies. No one knows
    will it work. Keep an eye on the console for errors.
  ex:
    - 2
  params:
    - shardId:
        desc: The ID of the shard to be restarted or reconnected.
send:
  desc: >-
    Sends a message to a channel or user.

    You can write "channel" (literally word 'channel') first followed by the
    channel id or channel mention, or

    You can write "user" (literally word 'user') first followed by the user id
    or user mention.

    After either one of those, specify the message to be sent.

    This command can only be used by the Bot Owner.
  ex:
    - channel 123123123132312 Stop spamming commands plz
    - user 1231231232132 I can see in the console what you're doing.
  params:
    - id:
        desc: The identifier of the recipient, either a channel or a user.
      text:
        desc: >-
          The recipient's preferred format for the message, such as plain text
          or formatted text with images and links.
      to:
        desc: >-
          The destination where the message will be sent, such as a specific
          channel or individual user.
setactivity:
  desc: >-
    Sets the bot's activity status. Optionally specify a type (Playing,
    Listening, Watching, Competing). Defaults to Custom status if no type given.
  ex:
    - Just chilling
    - Playing with snakes
    - Listening music
  params:
    - game:
        desc: The status text to display.
    - game:
        desc: The status text to display.
      type:
        desc: >-
          The activity type: Playing, Listening, Watching, or Competing.
setavatar:
  desc: >-
    Sets a new avatar image for the SantiBot. Parameter is a direct link to an
    image.
  ex:
    - https://i.imgur.com/xTG3a1I.jpg
  params:
    - img:
        desc: The URL of the image file to be displayed as the bot's avatar.
setbanner:
  desc: >-
    Sets a new banner image for the SantiBot. Parameter is a direct link to an
    image. Supports gifs.
  ex:
    - https://i.imgur.com/xTG3a1I.jpg
  params:
    - img:
        desc: The URL of the image file to be displayed as the bot's banner.
setname:
  desc: Gives the bot a new name.
  ex:
    - BotName
  params:
    - newName:
        desc: The new name given to the bot.
setstatus:
  desc: Sets the bot's status. (Online/Idle/Dnd/Invisible)
  ex:
    - Idle
  params:
    - status:
        desc: The current state or mode of the bot's presence in a chat.
setstream:
  desc: >-
    Sets the bots stream. First parameter is the twitch link, second parameter
    is stream name.
  ex:
    - TWITCHLINK Hello
  params:
    - name:
        desc: The name of the stream being set.
      url:
        desc: The URL of the Twitch channel's live stream page.
shardstats:
  desc: |-
    Stats for shards. Paginated with 25 shards per page.
    Format: `[status] | # [shard_id] | [last_heartbeat] | [server_count]`
  ex:
    - ''
    - 2
  params:
    - page:
        desc: The page number to display.
startupcommandadd:
  desc: >-
    Adds a command to the list of commands which will be executed automatically
    in the current channel, in the order they were added in, by the bot when it
    starts up.
  ex:
    - '{0}stats'
  params:
    - cmdText:
        desc: >-
          The text of the command that should be recognized and executed when a
          user types it.
startupcommandremove:
  desc: Removes a startup command on the specified index.
  ex:
    - 3
  params:
    - index:
        desc: The index at which to remove the startup command from the list.
startupcommandsclear:
  desc: Removes all startup commands.
  ex:
    - ''
  params:
    - {}
startupcommandslist:
  desc: Lists all startup commands in the order they will be executed in.
  ex:
    - ''
  params:
    - page:
        desc: The page number to display.
stringsreload:
  desc: Reloads localized bot strings.
  ex:
    - ''
  params:
    - {}
wait:
  desc: >-
    Used only as a startup command. Waits a certain number of milliseconds
    before continuing the execution of the following startup commands.
  ex:
    - 3000
  params:
    - miliseconds:
        desc: The time period to pause for.
