choose:
  desc: Chooses a thing from a list of things. Separate items with a semicolon ;
  ex:
    - Get up;Sleep;Sleep more
  params:
    - list:
        desc: The items separated by ;
eightball:
  desc: Ask the 8ball a yes/no question.
  ex:
    - Is b1nzy a nice guy?
  params:
    - question:
        desc: The user's inquiry or query that they want the 8ball to answer.
minesweeper:
  desc: |-
    Creates a spoiler-based minesweeper mini game.
    You may specify the number of mines.
  ex:
    - '15'
  params:
    - mines:
        desc: The number of mines to create.

