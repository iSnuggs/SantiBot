# ╔══════════════════════════════════════════════════════════════╗
# ║                  SANTIBOT CONFIGURATION                     ║
# ║                                                              ║
# ║  Copy this file to 'creds.yml' and fill in your values.     ║
# ║  Fields marked [REQUIRED] must be set for the bot to run.   ║
# ║  Fields marked [OPTIONAL] enable extra features.            ║
# ╚══════════════════════════════════════════════════════════════╝

# DO NOT CHANGE THIS VERSION NUMBER
version: 13

# ──────────────────────────────────────────────
# [REQUIRED] Discord Bot Token
# ──────────────────────────────────────────────
# 1. Go to https://discord.com/developers/applications
# 2. Click "New Application" and give it a name
# 3. Go to the "Bot" tab on the left
# 4. Click "Reset Token" and copy the token
# 5. Paste it below between the quotes
token: ''

# ──────────────────────────────────────────────
# [REQUIRED] Bot Owner IDs
# ──────────────────────────────────────────────
# Your Discord user ID(s). These users get full bot control.
# To find your ID: enable Developer Mode in Discord settings,
# right-click your name, and click "Copy User ID"
# DO NOT add people you don't trust!
ownerIds: []

# ──────────────────────────────────────────────
# Discord Settings
# ──────────────────────────────────────────────
# Keep this true — SantiBot needs privileged intents for features
# like member tracking, message content, and presence updates.
# Make sure to enable them in your Discord Developer Portal:
# Bot tab -> Privileged Gateway Intents -> enable all three
usePrivilegedIntents: true

# Number of shards. Leave at 1 unless you have 2500+ servers.
# If using multiple shards, change botCache to 'redis' below.
totalShards: 1

# ──────────────────────────────────────────────
# [OPTIONAL] AI Agent — Natural Language Commands
# ──────────────────────────────────────────────
# Lets users talk to the bot naturally (e.g., "@Bot what's the weather in Paris")
# and the bot translates it to the right command automatically.
# Requires an OpenAI-compatible API key.
santiAiToken:
aiApiKey: ''

# ──────────────────────────────────────────────
# [OPTIONAL] Google APIs — YouTube, Search, Images
# ──────────────────────────────────────────────
# Used for: YouTube music search, web search, image search
#
# YouTube Data API (for music and video lookups):
# 1. Go to https://console.cloud.google.com
# 2. Create a new project (or select existing)
# 3. Go to APIs & Services -> Library
# 4. Search "YouTube Data API v3" and enable it
# 5. Go to APIs & Services -> Credentials
# 6. Click "Create Credentials" -> "API Key"
# 7. Copy the key below
googleApiKey: ''

# Google Custom Search (for .google and .image commands):
# 1. Go to https://programmablesearchengine.google.com/cse/create/new
# 2. Name it anything, enable "Search the entire web"
# 3. Create it, then copy the "Search Engine ID" to searchId
# 4. Create ANOTHER search engine with "Image search" enabled
# 5. Copy that ID to imageSearchId
google:
  searchId:
  imageSearchId:

# ──────────────────────────────────────────────
# [OPTIONAL] Twitch — Stream Notifications
# ──────────────────────────────────────────────
# Used for: notifying channels when Twitch streamers go live
# 1. Go to https://dev.twitch.tv/console/apps
# 2. Click "Register Your Application"
# 3. Name: SantiBot, Category: Chat Bot
# 4. OAuth Redirect URL: http://localhost
# 5. Copy Client ID and generate a Client Secret
twitchClientId:
twitchClientSecret:

# ──────────────────────────────────────────────
# [OPTIONAL] Trovo — Stream Notifications
# ──────────────────────────────────────────────
# Used for: notifying channels when Trovo streamers go live
# 1. Go to https://developer.trovo.live/
# 2. Create an application and copy the Client ID
trovoClientId:

# ──────────────────────────────────────────────
# [OPTIONAL] Steam — Game & User Info
# ──────────────────────────────────────────────
# Used for: Steam profile lookups, game info
# 1. Go to https://steamcommunity.com/dev/apikey
# 2. Register for a Web API key
# 3. Copy it below
steamApiKey: ''

# ──────────────────────────────────────────────
# [OPTIONAL] osu! — Game Stats
# ──────────────────────────────────────────────
# Used for: osu! player stats and recent plays
# 1. Go to https://osu.ppy.sh/p/api
# 2. Register for an API key
# 3. Copy it below
osuApiKey:

# ──────────────────────────────────────────────
# [OPTIONAL] CoinMarketCap — Crypto Prices
# ──────────────────────────────────────────────
# Used for: cryptocurrency price lookups
# 1. Go to https://pro.coinmarketcap.com/account/
# 2. Sign up for the free Basic plan
# 3. Copy your API key below
coinmarketcapApiKey:

# ──────────────────────────────────────────────
# [OPTIONAL] Location & Timezone
# ──────────────────────────────────────────────
# Used for: .time command (shows current time in any city)
#
# LocationIQ (geocoding):
# 1. Go to https://locationiq.com
# 2. Register and check your email for the API token
locationIqApiKey:

# TimezoneDB (timezone lookup):
# 1. Go to https://timezonedb.com
# 2. Register and check your email for the API key
timezoneDbApiKey:

# ──────────────────────────────────────────────
# [OPTIONAL] RapidAPI — Various APIs
# ──────────────────────────────────────────────
# Used for: various lookup commands
# 1. Go to https://rapidapi.com
# 2. Sign up -> My Apps -> Add New App -> copy Application Key
rapidApiKey:

# ──────────────────────────────────────────────
# [OPTIONAL] Patreon — Supporter Rewards
# ──────────────────────────────────────────────
# Used for: auto-rewarding Patreon supporters with bot perks
# 1. Go to https://www.patreon.com/portal
# 2. My Clients -> Create Client
# 3. Fill in the details and copy credentials below
patreon:
  clientId:
  accessToken: ''
  refreshToken: ''
  clientSecret: ''
  # Find your campaign ID: go to your Patreon page while logged in,
  # open browser console (Ctrl+Shift+I) and run:
  # prompt('Campaign ID', window.patreon.bootstrap.creator.data.id);
  campaignId: ''

# ──────────────────────────────────────────────
# [OPTIONAL] Bot Lists — Voting & Stats
# ──────────────────────────────────────────────
# Used for: tracking votes on bot list sites
votes:
  # top.gg vote tracking
  topggServiceUrl: ''
  topggKey: ''
  # discords.com vote tracking
  discordsServiceUrl: ''
  discordsKey: ''

# DiscordBotList stats reporting
botListToken: ''

# ──────────────────────────────────────────────
# Database Settings
# ──────────────────────────────────────────────
# SQLite works great for single-server setups.
# Switch to PostgreSQL if you need better performance at scale.
botCache: Memory
redisOptions: localhost:6379,syncTimeout=30000,responseTimeout=30000,allowAdmin=true,password=
db:
  # Options: sqlite, mysql, postgresql
  type: sqlite
  # Default SQLite path (works out of the box):
  # For PostgreSQL: "Server=localhost;Port=5432;User Id=postgres;Password=YOUR_PASSWORD;Database=santibot;"
  # For MySQL: "Server=localhost;Port=3306;Uid=root;Pwd=YOUR_PASSWORD;Database=santibot"
  connectionString: Data Source=data/SantiBot.db

# ──────────────────────────────────────────────
# Advanced Settings
# ──────────────────────────────────────────────

# Coordinator URL (only change if running multi-shard setup)
coordinatorUrl: http://localhost:3442

# Restart command (how the bot restarts itself)
# Linux: cmd: SantiBot, args: "{0}"
# Windows: cmd: SantiBot.exe, args: "{0}"
restartCommand:
  cmd:
  args:

# Seq structured logging (optional, for debugging)
# 1. Install Seq from https://datalust.co/seq
# 2. Enter your Seq server URL and API key
seq:
  url:
  apiKey:
