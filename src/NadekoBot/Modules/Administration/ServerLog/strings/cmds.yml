log:
  desc: >-
    Toggles logging event. Disables it if it is active anywhere on the server.
    Enables if it isn't active. Use `{0}logevents` to see a list of all events
    you can subscribe to.
  ex:
    - userpresence
    - userbanned
  params:
    - type:
        desc: The type of log event to toggle.
logevents:
  desc: Shows a list of all events you can subscribe to with `{0}log`
  ex:
    - ''
  params:
    - {}
logignore:
  desc: >-
    Toggles whether the `{0}log` and `{0}logserver` commands ignore the
    specified channel or user. Provide no arguments to see the list of currently
    ignored users and channels.
  ex:
    - ''
    - '@SomeUser'
    - '#some-channel'
  params:
    - {}
    - target:
        desc: The channel to ignore.
    - target:
        desc: The user to ignore.
logserver:
  desc: >-
    Enables or Disables ALL log events. If enabled, all log events will log to
    this channel.
  ex:
    - enable
    - disable
  params:
    - action:
        desc: The type of action to take.
