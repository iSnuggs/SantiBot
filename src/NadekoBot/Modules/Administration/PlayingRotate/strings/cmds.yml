addplaying:
  desc: >-
    Adds a specified string to the list of playing strings to rotate. You have
    to pick either `Playing`, `Watching` or `Listening` as the first parameter.
  ex:
    - Playing with you
    - Watching you sleep
  params:
    - status:
        desc: The status text.
      statusType:
        desc: >-
          The type of status, allowed values are `Playing`, `Watching`, or
          `Listening`.
    - status:
        desc: The status text.
listplaying:
  desc: Lists all playing statuses and their indexes.
  ex:
    - ''
  params:
    - {}
removeplaying:
  desc: Removes a playing status by index. Use `{0}lipl` to see indexes.
  ex:
    - ''
  params:
    - index:
        desc: The index of the playing string to be removed.
rotateplaying:
  desc: >-
    Toggles rotation of playing status of the dynamic strings you previously
    specified.
  ex:
    - ''
  params:
    - {}
