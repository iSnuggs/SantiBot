vcrole:
  desc: >-
    Sets or resets a role which will be given to users who join the voice
    channel you're in when you run this command. Provide no role name to
    disable. You must be in a voice channel to run this command.
  ex:
    - SomeRole
    - ''
  params:
    - role:
        desc: The role to assign to users who join the voice channel.
vcrolelist:
  desc: Shows a list of currently set voice channel roles.
  ex:
    - ''
  params:
    - {}
vcrolerm:
  desc: >-
    Removes any `{0}vcrole` associated with the specified channel ID. This is
    useful if your vcrole has been enabled on a VC which has been deleted.
  ex:
    - 123123123123123
  params:
    - vcId:
        desc: The voice channel ID to remove the vcrole from.
