notify:
  desc: >-
    Sends a message to the specified channel once the specified event occurs.


    If no channel is specified, the message will be sent to the channel from
    which the event originated.

    *note: this is only possible for events that have an origin channel (for
    example `levelup`)*


    Provide no parameters to see all available events.
  ex:
    - >-
      levelup Congratulations to user %user.name% for reaching level
      %event.level%
  params:
    - {}
    - event:
        desc: The event for which to see the current message, if set.
    - channel:
        desc: The channel to send the message to.
      event:
        desc: The event to notify on.
      message:
        desc: The message to send.
    - event:
        desc: The event to notify on.
      message:
        desc: The message to send to the channel from which the event originated.
notifyclear:
  desc: Removes the specified notify event.
  ex:
    - levelup
  params:
    - event:
        desc: The notify event to clear.
notifylist:
  desc: Lists all active notifications in this server.
  ex:
    - ''
  params:
    - {}
notifyphs:
  desc: Lists the placeholders for a given notify event type
  ex:
    - levelup
  params:
    - event:
        desc: The notify event to list placeholders for.
