delmsg_channel_on: Увек ћу аутоматски брисати поруке које успешно изврше команде на овом каналу, без обзира на подешавање сервера.
delmsg_off: Више нећу аутоматски брисати поруке које успешно изврше команде на овом серверу.
delmsg_on: Аутоматски ћу брисати поруке које успешно изврше команде на овом серверу.
