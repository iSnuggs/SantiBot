delmsg_off: Nie będę już automatycznie usuwać wiadomości z pomyślnie wykonanymi komendami na tym serwerze.
delmsg_on: Będę automatycznie usuwać wiadomości z pomyślnie wykonanymi komendami na tym serwerze.
