delmsg_channel_on: Siempre eliminaré automáticamente los mensajes que ejecuten con éxito un comando en este canal, independientemente de la configuración del servidor.
delmsg_off: Ya no eliminaré automáticamente los mensajes que ejecuten con éxito un comando en este servidor.
delmsg_on: Eliminaré automáticamente los mensajes que ejecuten con éxito un comando en este servidor.
