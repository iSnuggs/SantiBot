btnroleadd:
  desc: >-
    Adds a button role to the specified message (link or id).

    Specify a message followed by an emote, followed by a role.

    If the role already exists on that message, the button will be updated
    instead.

    Users clicking on the button will receive the role.
  ex:
    - '<msglink> :thumbsup: Good Guy'
  params:
    - message:
        desc: >-
          A message link or id of the message (if id is specified, it has to be
          a message in this channel)
    - emote:
        desc: An emoji, custom or unicode
    - role:
        desc: The role to add once a user clicks the button
btnroleexclusive:
  desc: |-
    Toggles whether button roles are exclusive or not.
    If enabled, users can only pick one role from the buttons per message.
    If disabled, users can pick any number of roles.
  ex:
    - 123123123 enable
    - 123123123 disable
  params:
    - enable:
        desc: Whether to enable or disable exclusive button roles
      message:
        desc: A message link or id of the message
btnrolelist:
  desc: |-
    Lists all button roles on this server.
    One message per page.
  ex:
    - ''
  params:
    - {}
btnroleremove:
  desc: |-
    Removes a button role from the message specified by link or id.
    Provide a message followed by a role you wish to remove.
  ex:
    - <msglink> Good Guy
  params:
    - message:
        desc: A message link or id of the message
    - role:
        desc: A role to remove
btnroleremoveall:
  desc: Removes all button roles from the message specified by link or id.
  ex:
    - <msglink>
    - '123123123123'
  params:
    - message:
        desc: A message link or id of the message
createrole:
  desc: Creates a role with a given name.
  ex:
    - Awesome Role
  params:
    - roleName:
        desc: The name of the new role being created.
deleterole:
  desc: Deletes a role with a given name.
  ex:
    - Awesome Role
  params:
    - role:
        desc: The role being deleted, as identified by its id.
removeallroles:
  desc: >-
    Removes all roles which are lower than your highest role in the role
    hierarchy from the user you specify.
  ex:
    - '@User'
  params:
    - user:
        desc: >-
          The user whose roles will be updated to reflect the new role
          hierarchy.
removerole:
  desc: >-
    Removes a role from a user. The role you specify has to be lower in the role
    hierarchy than your highest role.
  ex:
    - '@User Admin'
  params:
    - roleToRemove:
        desc: The role being removed from the user's set of assigned roles.
      targetUser:
        desc: The user account being modified or checked for role eligibility.
renamerole:
  desc: >-
    Renames a role. The role you specify has to be lower in the role hierarchy
    than your highest role.
  ex:
    - '"First role" SecondRole'
  params:
    - newname:
        desc: The name for the new role.
      roleToEdit:
        desc: The role being edited or updated.
reroadd:
  desc: >-
    Specify a message id, emote and a role name to have the bot assign the
    specified role to the user who reacts to the specified message (in this
    channel) with the specified emoji.

    You can optionally specify an exclusivity group. Default is group 0 which is
    non-exclusive. Other groups are exclusive. Exclusive groups will let the
    user only have one of the roles specified in that group.

    You can optionally specify a level requirement after a group. Users who
    don't meet the level requirement will not receive the role.

    You can have up to 50 reaction roles per server in total.
  ex:
    - 971276352684691466 😊 gamer
    - 971276352684691466 😢 emo 1
    - 971276352684691466 🤔 philosopher 5 20
    - 971276352684691466 👨 normie 5 20
  params:
    - emoteStr:
        desc: The emoji used by users to react and trigger the role assignment.
      group:
        desc: The number of the exclusivity group.
      levelReq:
        desc: >-
          The minimum amount of experience points required for a user to be
          eligible for the assigned role.
      messageId:
        desc: >-
          The ID of the message that users must react to in order to receive the
          specified role.
      role:
        desc: The role that is assigned to users who react with the specified emoji.
rerodeleteall:
  desc: Deletes all reaction roles on the server. This action is irreversible.
  ex:
    - ''
  params:
    - {}
rerolist:
  desc: >-
    Lists all ReactionRole messages on this server with their message ids.
    Clicking/Tapping message ids will send you to that message.
  ex:
    - ''
  params:
    - page:
        desc: The number of the page to retrieve, starting from 1.
reroremove:
  desc: Remove all reaction roles from message specified by the id
  ex:
    - 971276352684691500
  params:
    - messageId:
        desc: >-
          The ID of a specific message that contains reaction roles to be
          removed.
rerotransfer:
  desc: >-
    Transfers reaction roles from one message to another by specifying their
    ids. If the target message has reaction roles specified already, the
    reaction roles will be MERGED, not overwritten.
  ex:
    - 971276352684691466 971427748448964628
  params:
    - fromMessageId:
        desc: >-
          The ID of the original message containing the reaction roles to be
          transferred.
      toMessageId:
        desc: >-
          The ID of the target message where the reaction roles should be
          transferred.
rolecolor:
  desc: >-
    Set a role's color using its hex value. Provide no color in order to see the
    hex value of the color of the specified role. The role you specify has to be
    lower in the role hierarchy than your highest role.
  ex:
    - Admin
    - ffba55 Admin
  params:
    - role:
        desc: The role that will have its color set or retrieved.
    - color:
        desc: The color used for the role's text and background.
      role:
        desc: The role that will have its color set or retrieved.
rolehoist:
  desc: >-
    Toggles whether this role is displayed in the sidebar or not. The role you
    specify has to be lower in the role hierarchy than your highest role.
  ex:
    - Guests
    - Space Wizards
  params:
    - role:
        desc: The role that determines the visibility of the sidebar.
roleicon:
  desc: Changes the icon of a role.
  ex:
    - '@Role :server_emoji_here:'
  params:
    - imageUrl:
        desc: The image url to be used as a new icon for the role.
      role:
        desc: The role to change the icon of.
    - role:
        desc: The role to change the icon of.
      serverEmoji:
        desc: The server emoji to be used as a new icon for the role.
setrole:
  desc: >-
    Gives a role to a user. The role you specify has to be lower in the role
    hierarchy than your highest role.
  ex:
    - '@User Guest'
  params:
    - roleToAdd:
        desc: >-
          The role that is being added grants specific permissions and access
          rights to the user.
      targetUser:
        desc: >-
          The user being given the new role, which must have a lower rank than
          the assistant's highest role.
stickyroles:
  desc: >-
    Toggles whether the bot will save the leaving users' roles, and reapply them
    once they re-join. The roles will be stored for up to 30 days.
  ex:
    - ''
  params:
    - {}
temprole:
  desc: >-
    Grants a user a temporary role for the specified number of time.

    The role must exist and be lower in the role hierarchy than your highest
    role.
  ex:
    - 15m @User Jail
    - 7d @Newbie Trial Member
  params:
    - role:
        desc: The role to give to the user.
      time:
        desc: The time after which the role is automatically removed.
      user:
        desc: The user to give the role to.
