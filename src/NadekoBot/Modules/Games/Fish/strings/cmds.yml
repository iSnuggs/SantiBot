fish:
  desc: >-
    Attempt to catch a fish.

    Different fish live in different places, at different times of day and in
    different weather.
  ex:
    - ''
  params:
    - {}
fishbuy:
  desc: >-
    Purchase a fishing item with the specified id.

    After purchase the item will appear in your inventory where you can
    use/equip it.
  ex:
    - '1'
  params:
    - id:
        desc: The ID of the item to buy.
fishinv:
  desc: |-
    Opens your fish inventory.
    Your inventory contains all items you've purchased but not spent.
  ex:
    - ''
  params:
    - {}
fishlb:
  desc: Shows the top anglers.
  ex:
    - ''
  params:
    - page:
        desc: The optional page to display.
fishlist:
  desc: >-
    Look at your fish catalogue.

    Shows how many of each fish you caught and what was the highest quality.

    For each caught fish, it also shows its required spot, time of day and
    weather.
  ex:
    - ''
  params:
    - {}
    - page:
        desc: The optional page to display.
fishshop:
  desc: |-
    Opens the fish shop.
    Lists all fish items available for sale
  ex:
    - ''
  params:
    - {}
fishspot:
  desc: Shows information about the current fish spot, weather and time.
  ex:
    - ''
  params:
    - {}
fishspotchange:
  desc: |-
    Uses a spot change coin to change the fishing spot of this channel.
    The new spot is random and affects everyone fishing in this channel.
  ex:
    - ''
  params:
    - {}
fishunequip:
  desc: |-
    Unequips an item by specifying its index in your inventory.
    You can use it again later.
    You can't unequip potions.
  ex:
    - '1'
  params:
    - index:
        desc: The index of the item to unequip.
fishuse:
  desc: |-
    Use a fishing item in your inventory.
    You can unequip it later, unless its a potion.
  ex:
    - '1'
  params:
    - index:
        desc: The index of the item to use.
fishstarslb:
  desc: Shows the fish stars leaderboard.
  ex:
    - ''
  params:
    - page:
        desc: The optional page to display.
