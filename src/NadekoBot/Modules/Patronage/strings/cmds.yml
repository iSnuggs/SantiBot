patron:
  desc: >-
    Check your patronage status and command usage quota. Bot owners can check
    targeted user's patronage status.
  ex:
    - ''
  params:
    - {}
    - user:
        desc: The ID or handle of the user whose patronage status is being checked.
patronmessage:
  desc: |-
    Sends a message to all patrons of the specified tier and higher.
    Supports [embeds](https://eb.nadeko.bot/)
  ex:
    - x hello
  params:
    - message:
        desc: The text content of the message being sent to patrons.
      tierAndHigher:
        desc: >-
          The tier or level of membership that determines which patrons receive
          the message.
