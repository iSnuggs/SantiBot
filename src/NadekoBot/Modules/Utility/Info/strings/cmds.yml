channelinfo:
  desc: >-
    Shows info about the channel. If no channel is supplied, it defaults to
    current one.
  ex:
    - '#some-channel'
  params:
    - channel:
        desc: The channel to retrieve information about.
invitecreate:
  desc: Creates a new invite which has infinite max uses and never expires.
  ex:
    - ''
  params:
    - params:
        desc: >-
          Optional flags: --expire (hours), --maxuses (number), --temporary,
          --unique.
invitedelete:
  desc: >-
    Deletes an invite on the specified index. Use `{0}invitelist` to see the
    list of invites.
  ex:
    - 2
  params:
    - index:
        desc: The index at which the invite is located in the invite list.
invitelist:
  desc: Lists all invites for this channel. Paginated with 9 per page.
  ex:
    - ''
    - 3
  params:
    - page:
        desc: The page number to retrieve, starting from 1.
      ch:
        desc: The channel for which to list invites.
roleinfo:
  desc: Shows info about the specified role.
  ex:
    - Gamers
  params:
    - role:
        desc: The role to show information about.
serverinfo:
  desc: >-
    Shows info about the server with the specified ID. The bot has to be on that
    server. If no server is supplied, it defaults to current one.
  ex:
    - 123123132233
  params:
    - guildId:
        desc: The ID of a server for which to retrieve information.
    - {}
userinfo:
  desc: >-
    Shows info about the user. If no user is supplied, it defaults a user
    running the command.
  ex:
    - '@SomeUser'
  params:
    - usr:
        desc: The guild user that the information is being retrieved for.
