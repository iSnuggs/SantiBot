todoadd:
  desc: Adds a new todo.
  ex:
    - I need to do this
  params:
    - todo:
        desc: The description or title of the new todo item.
todoarchiveadd:
  desc: Creates a new archive with the specified name using current todos.
  ex:
    - Day 1
  params:
    - name:
        desc: The name of the archive to be created.
todoarchivedelete:
  desc: Deletes the archived todo list with the specified ID.
  ex:
    - 99
  params:
    - todoId:
        desc: The identifier for the archived todo item to be deleted.
todoarchivedone:
  desc: >-
    Creates a new archive with the specified name using only completed current
    todos.
  ex:
    - Success!
  params:
    - name:
        desc: The name of the archive to be created.
todoarchivelist:
  desc: Lists all archived todo lists.
  ex:
    - ''
  params:
    - page:
        desc: >-
          The number of the page to retrieve from the list of archived todo
          lists.
todoarchiveshow:
  desc: Shows the archived todo list with the specified ID.
  ex:
    - 3c
  params:
    - todoId:
        desc: >-
          The identifier for a specific task or project that has been archived
          and is being retrieved.
todoclear:
  desc: Deletes all unarchived todos.
  ex:
    - ''
  params:
    - {}
todocomplete:
  desc: Marks a todo with the specified ID as done.
  ex:
    - 4a
  params:
    - todoId:
        desc: The id of the todo item being marked as completed.
tododelete:
  desc: Deletes a todo with the specified ID.
  ex:
    - abc
  params:
    - todoId:
        desc: The id of the todo item being deleted.
todoedit:
  desc: Edits a todo with the specified ID.
  ex:
    - abc This is an updated entry
  params:
    - newMessage:
        desc: The text of a new task description or update to an existing one.
      todoId:
        desc: The id of the todo item being edited.
todolist:
  desc: Lists all todos.
  ex:
    - ''
  params:
    - {}
todoshow:
  desc: Shows the text of the todo with the specified ID.
  ex:
    - 4a
  params:
    - todoId:
        desc: The id of the todo item being displayed.
todouncomplete:
  desc: Marks a todo with the specified ID as not done.
  ex:
    - 4a
  params:
    - todoId:
        desc: The id of the todo item being marked as not completed.
