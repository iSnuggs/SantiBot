waifu_not_participating: |-
  Постани **вајфу** или подржи некога као **фан** да зарадиш валуту!
  
  **Како функционише**
  `{0}woptin` - региструј се као вајфу
  `{0}wback @user` - подржи вајфу стањем на банковном рачуну
  `{0}wbuy @user` - постани менаџер вајфу
  
  **Улоге**
  🎀 **Вајфу** - зарађује провизију од сваког циклуса исплате
  🏢 **Менаџер** - купује позицију, зарађује део провизије
  👥 **Фан** - подржава вајфу стањем на рачуну, зарађује из фан фонда
  
  **Циклус**
  Сваких 3.5 дана, приноси се генеришу из подржаних средстава и деле између вајфу, менаџера и фанова. Одржавај расположење 😊 и храну 🍔 свог вајфу на високом нивоу за боље исплате!
