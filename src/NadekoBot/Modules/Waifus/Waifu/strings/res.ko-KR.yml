  👥 **팬** - 은행 잔액으로 와이푸를 후원하고, 팬 풀에서 수익 획득
  
  **사이클**
  3.5일마다 후원 자금에서 수익이 생성되어 와이푸, 매니저, 팬에게 분배돼요. 와이푸의 기분 😊과 음식 🍔을 높게 유지하면 더 많은 정산을 받을 수 있어요!
