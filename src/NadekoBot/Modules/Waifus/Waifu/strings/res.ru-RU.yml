waifu_not_participating: |-
  Станьте **Вайфу** или поддержите одну как **Фанат**, чтобы зарабатывать валюту!
  
  **Как это работает**
  `{0}woptin` - зарегистрируйтесь как вайфу
  `{0}wback @user` - поддержите вайфу банковским балансом
  `{0}wbuy @user` - станьте менеджером вайфу
  
  **Роли**
  🎀 **Вайфу** - получает комиссию от каждого цикла выплат
  🏢 **Менеджер** - покупает позицию, получает долю от комиссии вайфу
  👥 **Фанат** - поддерживает вайфу балансом, получает из пула фанатов
  
  **Цикл**
  Каждые 3,5 дня генерируются доходы из поддерживаемых фондов и распределяются между вайфу, менеджером и фанатами. Поддерживайте настроение 😊 и еду 🍔 вашей вайфу для лучших выплат!
