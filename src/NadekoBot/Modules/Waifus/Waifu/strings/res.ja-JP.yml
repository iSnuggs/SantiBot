waifu_not_participating: |-
  **ワイフ**になるか、**ファン**として応援して通貨を稼ぎましょう！
  
  **仕組み**
  `{0}woptin` - ワイフとして登録
  `{0}wback @user` - 銀行残高でワイフを応援
  `{0}wbuy @user` - ワイフのマネージャーになる
  
  **役割**
  🎀 **ワイフ** - 毎ペイアウトサイクルで手数料を獲得
  🏢 **マネージャー** - ポジションを購入し、ワイフの手数料の一部を獲得
  👥 **ファン** - 銀行残高でワイフを応援し、ファンプールから獲得
  
  **サイクル**
  3.5日ごとに、応援された資金からリターンが生成され、ワイフ、マネージャー、ファンの間で分配されます。ワイフのムード😊と食事🍔を高く保って、より良いペイアウトを！
