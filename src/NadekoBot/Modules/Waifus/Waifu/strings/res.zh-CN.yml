waifu_not_participating: |-
  成為**老婆**或作為**粉絲**支持一位來賺取貨幣！
  
  **運作方式**
  `{0}woptin` - 註冊成為老婆
  `{0}wback @user` - 用你的銀行餘額支持一位老婆
  `{0}wbuy @user` - 成為老婆的經理
  
  **角色**
  🎀 **老婆** - 每個收益週期獲得費用
  🏢 **經理** - 購買職位，獲得老婆費用的一部分
  👥 **粉絲** - 用銀行餘額支持老婆，從粉絲池中獲利
  
  **週期**
  每 3.5 天，從支持的資金中產生收益，並在老婆、經理和粉絲之間分配。保持你的老婆心情 😊 和食物 🍔 高，以獲得更好的收益！
