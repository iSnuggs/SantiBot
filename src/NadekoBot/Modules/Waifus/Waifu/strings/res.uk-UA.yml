waifu_not_participating: |-
  Стань **вайфу** або підтримай когось як **фанат**, щоб заробляти валюту!
  
  **Як це працює**
  `{0}woptin` - зареєструватися як вайфу
  `{0}wback @user` - підтримати вайфу своїм банківським балансом
  `{0}wbuy @user` - стати менеджером вайфу
  
  **Ролі**
  🎀 **Вайфу** - отримує комісію з кожного циклу виплат
  🏢 **Менеджер** - купує позицію, отримує частку від комісії вайфу
  👥 **Фанат** - підтримує вайфу банківським балансом, заробляє з фан-пулу
  
  **Цикл**
  Кожні 3.5 дні генеруються прибутки з підтриманих коштів і розподіляються між вайфу, менеджером і фанатами. Тримай настрій 😊 та їжу 🍔 вайфу на високому рівні для кращих виплат!
