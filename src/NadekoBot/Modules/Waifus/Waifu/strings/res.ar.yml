waifu_not_participating: |-
  كن **وايفو** أو ادعم واحدة كـ **معجب** لكسب العملات!
  
  **كيف يعمل**
  `{0}woptin` - سجّل كوايفو
  `{0}wback @user` - ادعم وايفو برصيدك البنكي
  `{0}wbuy @user` - كن مدير وايفو
  
  **الأدوار**
  🎀 **وايفو** - تكسب رسومًا من كل دورة توزيع
  🏢 **مدير** - يشتري المنصب، ويكسب حصة من رسوم الوايفو
  👥 **معجب** - يدعم وايفو برصيده البنكي، ويكسب من مجمع المعجبين
  
  **الدورة**
  كل 3.5 أيام، يتم توليد العوائد من الأموال المدعومة وتقسيمها بين الوايفو والمدير والمعجبين. حافظ على مزاج وايفوك 😊 وطعامها 🍔 مرتفعًا للحصول على توزيعات أفضل!
