# DO NOT CHANGE
version: 7
# Minimum price a waifu can have. Default 1000
minPrice: 1000
# Cost to opt into the waifu system. Default 10000
optInCost: 10000
# Price decay percentage per cycle for waifus without a manager (0-100). Default 10
managerlessDecayPercent: 10
# Hours per cycle. Default 24 (1 day)
cycleHours: 24
# Annual return rate as a decimal. Default 0.17 (17%)
baseReturnRate: 0.17
# Default max backed amount for computing returns. Default 1000000
defaultReturnsCap: 1000000
# Hours after cycle start when manager purchases are allowed. Default 18
buyWindowHours: 18
# Base mood points gained from a hug action. Default 50
baseMoodIncrease: 50
# Base food points gained from a nom action. Default 50
baseFoodIncrease: 50
# Max mood/food actions per user per day. Default 2
maxDailyActions: 2
# Max items in a single gift command. Default 100
maxGiftCount: 100
# Premium over current price to buy manager position (0.0-1.0). Default 0.15 (15%)
managerBuyPremium: 0.15
# Fraction of surplus (bid - old price) paid to the waifu (0.0-1.0). Default 0.50
surplusWaifuShare: 0.5
# Manager's cut of the waifu fee on cycle payouts (0.0-1.0). Default 0.15 (15%)
managerCutPercent: 0.15
