syntax = "proto3";

package vote;

option csharp_namespace = "SantiBot.GrpcVotesApi";

enum VoteType {
    TOPGG = 0;
    DISCORDBOTLIST = 1;
    DISCORDS = 2;
}

message GrpcVoteData {
    string userId = 1;
    VoteType type = 2;
}

message GrpcVoteResult {
  
}

service VoteService {
    rpc VoteReceived (GrpcVoteData) returns (GrpcVoteResult);
}