<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- 8-bit Miniature Pinscher "Santi" - 64x64 detailed version -->
  <!-- Black & Rust Min Pin with golden crown (King of Toys) -->
  <!-- On SantiBot blue background -->

  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1199ee"/>
      <stop offset="100%" stop-color="#0c95e9"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- === CROWN (King of Toys!) === -->
  <rect x="22" y="6" width="2" height="3" fill="#FFD700"/>
  <rect x="27" y="5" width="2" height="4" fill="#FFD700"/>
  <rect x="33" y="5" width="2" height="4" fill="#FFD700"/>
  <rect x="38" y="6" width="2" height="3" fill="#FFD700"/>
  <rect x="22" y="9" width="18" height="2" fill="#FFD700"/>
  <rect x="24" y="8" width="2" height="1" fill="#FFD700"/>
  <rect x="36" y="8" width="2" height="1" fill="#FFD700"/>
  <!-- Crown jewels -->
  <rect x="27" y="9" width="2" height="1" fill="#FF4444"/>
  <rect x="33" y="9" width="2" height="1" fill="#4444FF"/>

  <!-- === LEFT EAR (floppy) === -->
  <rect x="12" y="10" width="4" height="2" fill="#1a1a1a"/>
  <rect x="10" y="12" width="6" height="2" fill="#1a1a1a"/>
  <rect x="9" y="14" width="7" height="2" fill="#1a1a1a"/>
  <rect x="9" y="16" width="6" height="2" fill="#2a1a0a"/>
  <rect x="10" y="18" width="5" height="2" fill="#1a1a1a"/>
  <rect x="12" y="20" width="3" height="1" fill="#1a1a1a"/>

  <!-- === RIGHT EAR (floppy) === -->
  <rect x="48" y="10" width="4" height="2" fill="#1a1a1a"/>
  <rect x="48" y="12" width="6" height="2" fill="#1a1a1a"/>
  <rect x="48" y="14" width="7" height="2" fill="#1a1a1a"/>
  <rect x="49" y="16" width="6" height="2" fill="#2a1a0a"/>
  <rect x="49" y="18" width="5" height="2" fill="#1a1a1a"/>
  <rect x="49" y="20" width="3" height="1" fill="#1a1a1a"/>

  <!-- === HEAD (black) === -->
  <rect x="18" y="11" width="28" height="2" fill="#1a1a1a"/>
  <rect x="16" y="13" width="32" height="2" fill="#1a1a1a"/>
  <rect x="15" y="15" width="34" height="2" fill="#1a1a1a"/>
  <rect x="15" y="17" width="34" height="2" fill="#1a1a1a"/>

  <!-- === EYEBROW MARKINGS (rust) === -->
  <rect x="18" y="19" width="8" height="2" fill="#8B4513"/>
  <rect x="38" y="19" width="8" height="2" fill="#8B4513"/>
  <rect x="15" y="19" width="3" height="2" fill="#1a1a1a"/>
  <rect x="26" y="19" width="12" height="2" fill="#1a1a1a"/>
  <rect x="46" y="19" width="3" height="2" fill="#1a1a1a"/>

  <!-- === EYES === -->
  <!-- Left eye -->
  <rect x="15" y="21" width="4" height="2" fill="#1a1a1a"/>
  <rect x="19" y="21" width="4" height="4" fill="#222222"/>
  <rect x="20" y="22" width="2" height="2" fill="#FFFFFF"/>
  <rect x="23" y="21" width="4" height="2" fill="#1a1a1a"/>

  <!-- Right eye -->
  <rect x="37" y="21" width="4" height="2" fill="#1a1a1a"/>
  <rect x="41" y="21" width="4" height="4" fill="#222222"/>
  <rect x="42" y="22" width="2" height="2" fill="#FFFFFF"/>
  <rect x="45" y="21" width="4" height="2" fill="#1a1a1a"/>

  <!-- Between eyes -->
  <rect x="27" y="21" width="10" height="2" fill="#1a1a1a"/>

  <!-- === CHEEKS (rust brown) === -->
  <rect x="15" y="23" width="4" height="2" fill="#1a1a1a"/>
  <rect x="19" y="25" width="4" height="2" fill="#8B4513"/>
  <rect x="41" y="25" width="4" height="2" fill="#8B4513"/>
  <rect x="45" y="23" width="4" height="2" fill="#1a1a1a"/>

  <!-- Below eyes transition -->
  <rect x="15" y="25" width="4" height="2" fill="#8B4513"/>
  <rect x="23" y="25" width="4" height="2" fill="#8B4513"/>
  <rect x="27" y="25" width="10" height="2" fill="#1a1a1a"/>
  <rect x="37" y="25" width="4" height="2" fill="#8B4513"/>
  <rect x="45" y="25" width="4" height="2" fill="#8B4513"/>

  <!-- === MUZZLE === -->
  <rect x="17" y="27" width="6" height="2" fill="#CD853F"/>
  <rect x="41" y="27" width="6" height="2" fill="#CD853F"/>
  <rect x="23" y="27" width="4" height="2" fill="#D2A679"/>
  <rect x="37" y="27" width="4" height="2" fill="#D2A679"/>

  <!-- Nose -->
  <rect x="27" y="27" width="10" height="3" fill="#0a0a0a"/>
  <rect x="28" y="28" width="2" height="1" fill="#333333"/>

  <!-- === MOUTH === -->
  <rect x="20" y="29" width="6" height="2" fill="#CD853F"/>
  <rect x="38" y="29" width="6" height="2" fill="#CD853F"/>
  <rect x="26" y="30" width="12" height="2" fill="#D2A679"/>

  <!-- Tongue (happy panting!) -->
  <rect x="29" y="32" width="2" height="1" fill="#1a1a1a"/>
  <rect x="31" y="31" width="4" height="3" fill="#E75480"/>
  <rect x="32" y="34" width="2" height="1" fill="#D4607A"/>
  <rect x="35" y="32" width="2" height="1" fill="#1a1a1a"/>

  <!-- Mouth line -->
  <rect x="26" y="32" width="3" height="1" fill="#1a1a1a"/>
  <rect x="37" y="32" width="3" height="1" fill="#1a1a1a"/>

  <!-- === CHIN === -->
  <rect x="22" y="33" width="20" height="2" fill="#CD853F"/>

  <!-- === CHEST (rust V marking) === -->
  <rect x="20" y="35" width="6" height="2" fill="#1a1a1a"/>
  <rect x="26" y="35" width="12" height="2" fill="#8B4513"/>
  <rect x="38" y="35" width="6" height="2" fill="#1a1a1a"/>

  <!-- Chest highlight -->
  <rect x="28" y="36" width="8" height="1" fill="#CD853F"/>

  <!-- === BODY === -->
  <rect x="18" y="37" width="6" height="2" fill="#1a1a1a"/>
  <rect x="24" y="37" width="16" height="2" fill="#8B4513"/>
  <rect x="40" y="37" width="6" height="2" fill="#1a1a1a"/>

  <rect x="16" y="39" width="6" height="2" fill="#1a1a1a"/>
  <rect x="22" y="39" width="20" height="2" fill="#8B4513"/>
  <rect x="42" y="39" width="6" height="2" fill="#1a1a1a"/>

  <!-- Belly -->
  <rect x="16" y="41" width="6" height="2" fill="#1a1a1a"/>
  <rect x="22" y="41" width="20" height="2" fill="#CD853F"/>
  <rect x="42" y="41" width="6" height="2" fill="#1a1a1a"/>

  <!-- === LEGS === -->
  <!-- Front left leg -->
  <rect x="16" y="43" width="4" height="2" fill="#1a1a1a"/>
  <rect x="16" y="45" width="4" height="2" fill="#1a1a1a"/>
  <rect x="15" y="47" width="4" height="2" fill="#1a1a1a"/>
  <!-- Paw -->
  <rect x="14" y="49" width="6" height="2" fill="#CD853F"/>

  <!-- Front right leg -->
  <rect x="44" y="43" width="4" height="2" fill="#1a1a1a"/>
  <rect x="44" y="45" width="4" height="2" fill="#1a1a1a"/>
  <rect x="45" y="47" width="4" height="2" fill="#1a1a1a"/>
  <!-- Paw -->
  <rect x="44" y="49" width="6" height="2" fill="#CD853F"/>

  <!-- Belly between legs -->
  <rect x="20" y="43" width="24" height="2" fill="#CD853F"/>
  <rect x="22" y="45" width="20" height="2" fill="#CD853F"/>

  <!-- === TAIL (perky, typical Min Pin) === -->
  <rect x="46" y="35" width="2" height="2" fill="#1a1a1a"/>
  <rect x="48" y="33" width="2" height="2" fill="#1a1a1a"/>
  <rect x="50" y="31" width="2" height="2" fill="#1a1a1a"/>
</svg>
