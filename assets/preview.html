<!DOCTYPE html>
<html>
<head>
  <title>Santi Pixel Art Preview</title>
  <style>
    body { background: #0f1117; color: #e4e4e7; font-family: monospace; padding: 40px; text-align: center; }
    h1 { color: #0c95e9; font-size: 24px; }
    .row { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin: 30px 0; }
    .card { background: #1a1b23; border: 1px solid #2a2b35; border-radius: 12px; padding: 24px; }
    .card img { image-rendering: pixelated; image-rendering: -moz-crisp-edges; display: block; margin: 0 auto; }
    .label { color: #71717a; font-size: 12px; margin-top: 8px; }
    .blue-bg img { background: #0c95e9; border-radius: 50%; }
    .dark-bg img { background: #1a1b23; }
  </style>
</head>
<body>
  <h1>Santi — 16x16 Pixel Art Min Pin</h1>
  <p style="color:#71717a">Black & Rust • Floppy Ears • Crown (King of Toys!) • Happy Tongue</p>

  <h2 style="color:#71717a; margin-top:40px;">On Blue Background</h2>
  <div class="row blue-bg">
    <div class="card"><img src="santi-avatar.svg" width="64" height="64"/><div class="label">64px</div></div>
    <div class="card"><img src="santi-avatar.svg" width="128" height="128"/><div class="label">128px</div></div>
    <div class="card"><img src="santi-avatar.svg" width="256" height="256"/><div class="label">256px</div></div>
    <div class="card"><img src="santi-avatar.svg" width="512" height="512"/><div class="label">512px</div></div>
  </div>

  <h2 style="color:#71717a; margin-top:40px;">On Dark Background</h2>
  <div class="row dark-bg">
    <div class="card"><img src="santi-avatar.svg" width="64" height="64"/><div class="label">64px</div></div>
    <div class="card"><img src="santi-avatar.svg" width="128" height="128"/><div class="label">128px</div></div>
    <div class="card"><img src="santi-avatar.svg" width="256" height="256"/><div class="label">256px</div></div>
    <div class="card"><img src="santi-avatar.svg" width="512" height="512"/><div class="label">512px</div></div>
  </div>

  <h2 style="color:#71717a; margin-top:40px;">Transparent (Raw)</h2>
  <div class="row">
    <div class="card"><img src="santi-avatar.svg" width="256" height="256"/><div class="label">256px — transparent bg</div></div>
  </div>

  <p style="margin-top: 40px; color: #71717a; font-size: 11px;">Open this file in a browser to preview • assets/preview.html</p>
</body>
</html>
